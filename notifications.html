<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ZenithTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gt-header { background: #2E080E; }
    </style>
</head>
<body class="bg-[#f4f6f5]">

    <!-- Header -->
    <header class="gt-header px-6 py-4 sticky top-0 z-50 shadow-md">
        <nav class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="zenith-logo.png" alt="Zenith" class="w-8 h-8 rounded-full object-cover" style="mix-blend-mode: lighten;">
                <div class="w-px h-5 bg-white/30 mx-0.5"></div>
                <a href="discover.html" class="text-xl font-bold text-white tracking-tight">ZenithTales</a>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex gap-6">
                    <a href="discover.html" class="text-sm text-white/80 hover:text-white transition-colors">Discover</a>
                    <a href="dashboard.html" class="text-sm text-white/80 hover:text-white transition-colors">My Journey</a>
                </div>
                <a href="notifications.html" class="relative flex items-center justify-center w-9 h-9 bg-white/20 rounded-full">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </a>
                <div class="relative">
                    <button id="profile-menu-button" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 p-1 pr-3 rounded-full transition-all">
                        <div id="header-avatar-wrap" class="w-8 h-8 rounded-full bg-white/30 animate-pulse"></div>
                        <span id="header-name" class="hidden sm:inline font-semibold text-white text-sm">...</span>
                    </button>
                    <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 z-20 border border-gray-100">
                        <a href="settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-[#FAF9F6]">Settings</a>
                        <a href="admin.html" id="admin-nav-link" class="hidden px-4 py-2 text-sm text-[#4A0E17] font-semibold hover:bg-[#f0faf8] items-center gap-2">
                            <svg class="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                            Admin Panel
                        </a>
                        <hr class="my-2 border-gray-100">
                        <a href="#" id="logout-button" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">Log Out</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-2xl">

        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Notifications</h1>
            <button id="mark-all-read-btn" class="text-sm text-[#4A0E17] font-semibold hover:underline hidden">
                Mark all as read
            </button>
        </div>

        <div id="notif-list" class="space-y-2">
            <!-- Skeletons -->
            <div class="bg-white rounded-xl border border-gray-200 p-4 flex gap-3 animate-pulse">
                <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                <div class="flex-1 space-y-2 py-1">
                    <div class="h-3 bg-gray-200 rounded w-3/4"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/2"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-4 flex gap-3 animate-pulse">
                <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                <div class="flex-1 space-y-2 py-1">
                    <div class="h-3 bg-gray-200 rounded w-2/3"></div>
                    <div class="h-3 bg-gray-200 rounded w-1/3"></div>
                </div>
            </div>
        </div>

        <div id="notif-empty" class="hidden flex flex-col items-center justify-center py-24 text-center">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </div>
            <p class="font-semibold text-gray-600">You're all caught up!</p>
            <p class="text-sm text-gray-400 mt-1">No notifications yet.</p>
        </div>

    </main>

    <script>
    const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000'
        : window.location.origin;

    document.addEventListener('DOMContentLoaded', async () => {

        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'login.html'; return; }

        // ── Load current user for header ──────────────────────────────────────
        let currentUser = null;
        try {
            const res = await fetch(`${API_BASE}/api/user/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                const data = await res.json();
                currentUser = data.user;
            } else {
                localStorage.clear();
                window.location.href = 'login.html';
                return;
            }
        } catch (e) {
            window.location.href = 'login.html';
            return;
        }

        // ── Populate header avatar ────────────────────────────────────────────
        const avatarUrl = currentUser.profile_picture
            || `https://placehold.co/40x40/e0e7ff/3730a3?text=${(currentUser.name || 'U').charAt(0).toUpperCase()}`;

        const avatarWrap = document.getElementById('header-avatar-wrap');
        avatarWrap.outerHTML = `<img src="${avatarUrl}" alt="Avatar" id="header-avatar" class="w-8 h-8 rounded-full object-cover">`;
        document.getElementById('header-name').textContent = currentUser.name || 'User';

        if (currentUser.is_admin && !document.getElementById('admin-header-badge')) {
            const logoLink = document.querySelector('header a[href="discover.html"].text-xl');
            if (logoLink) logoLink.insertAdjacentHTML('afterend', '<span id="admin-header-badge" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:0.06em;text-transform:uppercase;">Admin</span>');
        }

        const adminLink = document.getElementById('admin-nav-link');
        if (adminLink && currentUser.is_admin) {
            adminLink.classList.remove('hidden');
            adminLink.classList.add('flex');
        }

        document.getElementById('profile-menu-button').addEventListener('click', () => {
            document.getElementById('profile-menu').classList.toggle('hidden');
        });
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('profile-menu');
            const btn = document.getElementById('profile-menu-button');
            if (menu && !menu.classList.contains('hidden') && !btn?.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });
        document.getElementById('logout-button').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = 'index.html';
        });

        // ── Load notifications ────────────────────────────────────────────────
        const notifList = document.getElementById('notif-list');
        const notifEmpty = document.getElementById('notif-empty');
        const markAllBtn = document.getElementById('mark-all-read-btn');

        async function loadNotifications() {
            try {
                const res = await fetch(`${API_BASE}/api/notifications`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error();
                const notifications = await res.json();

                notifList.innerHTML = '';

                if (notifications.length === 0) {
                    notifEmpty.classList.remove('hidden');
                    markAllBtn.classList.add('hidden');
                    return;
                }

                const hasUnread = notifications.some(n => !n.is_read);
                if (hasUnread) markAllBtn.classList.remove('hidden');

                notifications.forEach(n => {
                    notifList.insertAdjacentHTML('beforeend', renderNotif(n));
                });

            } catch (e) {
                notifList.innerHTML = '<p class="text-center text-red-400 text-sm py-10">Could not load notifications.</p>';
            }
        }

        // ── Handle individual notification clicks ─────────────────────────
        notifList.addEventListener('click', async (e) => {
            const link = e.target.closest('a[data-notif-id]');
            if (!link) return;
            const notifId = link.dataset.notifId;
            const isRead = link.dataset.isRead === 'true';
            if (isRead) return; // already read, no need to update

            try {
                await fetch(`${API_BASE}/api/notifications/read/${notifId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                // Update the card visually
                const card = link.closest('.rounded-xl');
                if (card) {
                    card.classList.remove('bg-[#f0faf8]', 'border-[#c7e8e3]');
                    card.classList.add('bg-white');
                    const dot = card.querySelector('.bg-\\[\\#4A0E17\\].rounded-full.w-2');
                    dot?.remove();
                }
                link.dataset.isRead = 'true';
                // Update badge count
                updateBadgeCount(-1);
            } catch (e) {
                console.error('Failed to mark notification as read:', e);
            }
        });
function renderNotif(n) {
    const avatar = n.sender_avatar
        || `https://placehold.co/40x40/e0e7ff/3730a3?text=${(n.sender_name || 'U').charAt(0).toUpperCase()}`;

    let timeAgo = '';
    try {
        timeAgo = dateFns.formatDistanceToNow(new Date(n.created_at), { addSuffix: true });
    } catch (e) {
        timeAgo = new Date(n.created_at).toLocaleDateString();
    }

    const messages = {
        like:       `<strong>${n.sender_name}</strong> liked your tale: <em class="not-italic text-gray-500">${n.tale_title || ''}</em>`,
        comment:    `<strong>${n.sender_name}</strong> commented on <em class="not-italic text-gray-500">${n.tale_title || ''}</em>`,
        reply:      `<strong>${n.sender_name}</strong> replied to your comment on <em class="not-italic text-gray-500">${n.tale_title || ''}</em>`,
        admin_post: `<strong>${n.sender_name}</strong> made an announcement: <em class="not-italic text-gray-500">${n.tale_title || ''}</em>`
    };

    const icons = {
        like:    `<span class="absolute -bottom-0.5 -right-0.5 w-5 h-5 bg-red-500 rounded-full flex items-center justify-center shadow-sm"><svg width="10" height="10" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="1"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></span>`,
        comment: `<span class="absolute -bottom-0.5 -right-0.5 w-5 h-5 bg-[#4A0E17] rounded-full flex items-center justify-center shadow-sm"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg></span>`,
        reply:      `<span class="absolute -bottom-0.5 -right-0.5 w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center shadow-sm"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M9 17l-4-4 4-4M20 18v-2a4 4 0 00-4-4H5"/></svg></span>`,
        admin_post: `<span class="absolute -bottom-0.5 -right-0.5 w-5 h-5 bg-[#4A0E17] rounded-full flex items-center justify-center shadow-sm"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.75 3.75 0 01-1.564-.317z"/></svg></span>`
    };

    const bgClass = n.is_read ? 'bg-white' : 'bg-[#f0faf8] border-[#c7e8e3]';

    // Smart link: comments/replies open discover with comment modal, likes just open the tale
    let taleLink = '';
    if (n.tale_id) {
        const href = (n.type === 'comment' || n.type === 'reply')
            ? `discover.html?open_comments=${n.tale_id}`
            : `discover.html?open_tale=${n.tale_id}`;
        taleLink = `<a href="${href}" class="absolute inset-0 z-10" aria-label="View tale"
            data-notif-id="${n.id}" data-is-read="${n.is_read}"></a>`;
    }

    return `
        <div class="${bgClass} rounded-xl border border-gray-200 p-4 transition-colors relative hover:border-[#4A0E17] cursor-pointer">
            <div class="flex gap-3">
                <div class="relative flex-shrink-0">
                    <img src="${avatar}" alt="${n.sender_name}" class="w-10 h-10 rounded-full object-cover">
                    ${icons[n.type] || ''}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm text-[#292524] leading-snug">${messages[n.type] || 'New notification'}</p>
                    <p class="text-xs text-gray-400 mt-0.5">${timeAgo}</p>
                </div>
                ${!n.is_read ? '<div class="w-2 h-2 bg-[#4A0E17] rounded-full flex-shrink-0 mt-1.5"></div>' : ''}
            </div>
            ${taleLink}
        </div>
    `;
}
function updateBadgeCount(delta) {
            document.querySelectorAll('#notif-badge').forEach(badge => {
                const current = parseInt(badge.textContent) || 0;
                const newCount = Math.max(0, current + delta);
                if (newCount === 0) {
                    badge.classList.add('hidden');
                    badge.classList.remove('flex');
                    markAllBtn.classList.add('hidden');
                } else {
                    badge.textContent = newCount > 9 ? '9+' : newCount;
                    badge.classList.remove('hidden');
                    badge.classList.add('flex');
                }
            });
        }
        // ── Mark all as read ──────────────────────────────────────────────────
        markAllBtn.addEventListener('click', async () => {
            try {
                await fetch(`${API_BASE}/api/notifications/read`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                markAllBtn.classList.add('hidden');
                // Zero out the badge
                document.querySelectorAll('#notif-badge').forEach(badge => {
                    badge.classList.add('hidden');
                    badge.classList.remove('flex');
                });
                await loadNotifications();
            } catch (e) {
                console.error('Mark read failed:', e);
            }
        });

        loadNotifications();
    });
    </script>
</body>
</html>
