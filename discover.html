<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Journeys - ZenithTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .active-filter {
            background-color: #4A0E17 !important;
            color: white !important;
            border-color: #4A0E17 !important;
        }
    </style>
</head>
<body class="bg-[#f4f6f5] font-['Inter']">

    <header class="gt-header px-6 py-4 sticky top-0 z-50 shadow-md">
        <nav class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="zenith-logo.png" alt="Zenith" class="w-8 h-8 rounded-full object-cover" style="mix-blend-mode: lighten;">
                <div class="w-px h-5 bg-white/30 mx-0.5"></div>
                <a href="discover.html" class="text-xl font-bold text-white tracking-tight">ZenithTales</a>
            </div>
            
            <div id="auth-status" class="flex items-center gap-6">
                <div class="hidden md:flex gap-6">
                    <a href="discover.html" class="text-sm text-white font-medium">Discover</a>
                    <a href="dashboard.html" class="text-sm text-white/80 hover:text-white transition-colors">My Journey</a>
                </div>
                
                <div id="login-signup-btns" class="flex items-center gap-3">
                    <a href="login.html" class="gt-btn-outline px-4 py-1.5 rounded-md text-sm font-medium">Log in</a>
                    <a href="signup.html" class="gt-btn-solid px-4 py-1.5 rounded-md text-sm font-bold shadow-sm">Sign up</a>
                </div>

                <!-- Notifications -->
                <a id="notif-bell" href="notifications.html" class="hidden relative items-center justify-center w-9 h-9 bg-white/10 hover:bg-white/20 rounded-full transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-[9px] font-bold flex items-center justify-center">0</span>
                </a>
                <button id="profile-menu-button" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 p-1 pr-3 rounded-full transition-all">
                </button>
                <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl py-2 z-20 border border-gray-100">
                    <a href="settings.html" class="block px-4 py-2 text-sm text-gray-700 hover:bg-[#FAF9F6]">Settings</a>
<a href="admin.html" id="admin-nav-link" class="hidden px-4 py-2 text-sm text-[#4A0E17] hover:bg-[#e8f4f2] font-medium items-center gap-2">
    ⚙ Admin Panel
</a>
<hr class="my-2 border-gray-100">
<a href="#" id="logout-button" class="block px-4 py-2 text-sm text-red-600 hover:bg-red-50 font-medium">Log Out</a>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-6xl">
        
        <div class="mb-10 text-center md:text-left">
            <h1 class="text-3xl font-bold text-[#1a1a1a] mb-2">Discover journeys</h1>
            <p class="text-[#6b7280] text-sm">Explore projects, achievements and stories from the ZenithTales community.</p>
        </div>

        <div class="gt-search-container mb-6 shadow-sm">
            <div class="flex items-center pl-3 flex-1">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="search" id="search-input" placeholder="Search by keyword, name, skill..." 
                       class="w-full bg-transparent border-none focus:ring-0 px-3 py-2 text-sm text-gray-700 outline-none">
            </div>
            <select id="category-filter" class="hidden md:block bg-[#FAF9F6] border border-gray-200 rounded-lg px-3 py-1.5 text-sm text-gray-600 outline-none cursor-pointer">
                <option value="">All categories</option>
                <option>Projects</option>
                <option>Academics</option>
                <option>Achievements</option>
                <option>Leadership & Events</option>
                <option>Research & Papers</option>
                <option>Reflections</option>
            </select>
            <button class="bg-[#4A0E17] text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-[#2E080E] transition-all">Search</button>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-wrap gap-x-6 gap-y-3 mb-6 items-center">

            <!-- Sort Filter -->
            <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-bold text-[#6b7280] uppercase tracking-widest">Sort</span>
                <div class="flex flex-wrap gap-1.5" id="sortFilters">
                    <button onclick="setSort('newest')" data-sort="newest" class="sort-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Newest</button>
                    <button onclick="setSort('oldest')" data-sort="oldest" class="sort-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Oldest</button>
                    <button onclick="setSort('top')" data-sort="top" class="sort-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Most Liked</button>
                </div>
            </div>

            <!-- Divider -->
            <div class="w-px h-5 bg-gray-200 hidden sm:block"></div>

            <!-- Campus Filter -->
            <div class="flex items-center gap-2 flex-wrap">
                <span class="text-xs font-bold text-[#6b7280] uppercase tracking-widest">Campus</span>
                <div class="flex flex-wrap gap-1.5" id="campusFilters">
                    <button onclick="setCampus('')" data-campus="" class="campus-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">All</button>
                    <button onclick="setCampus('Hyderabad')" data-campus="Hyderabad" class="campus-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Hyderabad</button>
                    <button onclick="setCampus('Visakhapatnam')" data-campus="Visakhapatnam" class="campus-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Vizag</button>
                    <button onclick="setCampus('Bangalore')" data-campus="Bangalore" class="campus-btn px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Bangalore</button>
                </div>
            </div>

            <!-- Admin filter -->
            <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-[#6b7280] uppercase tracking-widest">Filter</span>
                <button onclick="setAdminFilter()" id="admin-filter-btn" class="px-3 py-1 rounded-full text-xs font-medium border border-[#d5e0dd] bg-white text-gray-600 hover:border-[#4A0E17] hover:text-[#4A0E17] transition-all">Admin Posts</button>
            </div>

            <!-- Results count pushed to the right -->
            <div class="ml-auto">
                <div id="results-count" class="text-xs text-gray-400">Showing all stories</div>
            </div>

        </div>

        <!-- Feed: CSS Grid so cards flow left-to-right in correct order -->
        <div id="discover-feed" class="columns-1 md:columns-2 lg:columns-3 gap-6">
            <div class="bg-white rounded-xl border border-[#d5e0dd] overflow-hidden animate-pulse">
                <div class="p-4">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                        <div class="space-y-2 flex-1">
                            <div class="h-3 w-24 bg-gray-200 rounded"></div>
                            <div class="h-3 w-36 bg-gray-200 rounded"></div>
                        </div>
                    </div>
                    <div class="h-5 w-3/4 bg-gray-200 rounded mb-3"></div>
                    <div class="space-y-2">
                        <div class="h-3 w-full bg-gray-200 rounded"></div>
                        <div class="h-3 w-5/6 bg-gray-200 rounded"></div>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl border border-[#d5e0dd] overflow-hidden animate-pulse hidden md:block">
                <div class="p-4">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                        <div class="space-y-2 flex-1">
                            <div class="h-3 w-24 bg-gray-200 rounded"></div>
                            <div class="h-3 w-36 bg-gray-200 rounded"></div>
                        </div>
                    </div>
                    <div class="h-5 w-2/3 bg-gray-200 rounded mb-3"></div>
                    <div class="h-40 w-full bg-gray-200 rounded-lg"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl border border-[#d5e0dd] overflow-hidden animate-pulse hidden lg:block">
                <div class="p-4">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                        <div class="space-y-2 flex-1">
                            <div class="h-3 w-24 bg-gray-200 rounded"></div>
                            <div class="h-3 w-36 bg-gray-200 rounded"></div>
                        </div>
                    </div>
                    <div class="h-5 w-3/4 bg-gray-200 rounded mb-3"></div>
                    <div class="space-y-2">
                        <div class="h-3 w-full bg-gray-200 rounded"></div>
                        <div class="h-3 w-5/6 bg-gray-200 rounded"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="no-results-message" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900">No journeys found</h3>
            <p class="text-sm text-gray-500">Try adjusting your search or category filters.</p>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/discover.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
