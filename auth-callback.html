<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging in...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAF9F6] flex items-center justify-center min-h-screen">
    <div class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#4A0E17] mx-auto mb-4"></div>
        <p class="text-gray-600">Please wait, logging you in...</p>
    </div>
    <script>
        // Simply check if token exists and redirect accordingly
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
