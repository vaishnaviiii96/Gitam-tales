<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - ZenithTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#FAF9F6] font-sans">

    <div class="flex flex-col items-center justify-center min-h-screen px-4 py-8">
        <a href="index.html" class="text-3xl font-bold text-gray-900 mb-8">ZenithTales</a>

        <div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-gray-200 p-8">
            <h2 class="text-2xl font-bold text-center text-[#292524] mb-2">Reset Your Password</h2>
            <p class="text-center text-gray-500 mb-6">Enter your new password below.</p>

            <!-- Success State -->
            <div id="success-state" class="hidden text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-[#292524] mb-2">Password Updated!</h3>
                <p class="text-gray-600 mb-6">Your password has been changed successfully.</p>
                <a href="login.html" class="bg-[#4A0E17] hover:bg-[#2E080E] text-white font-bold py-3 px-6 rounded-lg inline-block">
                    Go to Login
                </a>
            </div>

            <!-- Invalid Token State -->
            <div id="invalid-state" class="hidden text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-[#292524] mb-2">Link Expired or Invalid</h3>
                <p class="text-gray-600 mb-6">This reset link is no longer valid. Please request a new one.</p>
                <a href="login.html" class="bg-[#4A0E17] hover:bg-[#2E080E] text-white font-bold py-3 px-6 rounded-lg inline-block">
                    Back to Login
                </a>
            </div>

            <!-- Reset Form -->
            <form id="reset-form" class="space-y-5">
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-700">New Password</label>
                    <div class="relative mt-1">
                        <input type="password" id="new-password" required minlength="8"
                            class="block w-full px-4 py-3 bg-gray-100 border-gray-200 rounded-lg focus:ring-[#4A0E17] focus:border-[#4A0E17] pr-10"
                            placeholder="8+ characters">
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 px-3 flex items-center text-gray-500">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.432 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input type="password" id="confirm-password" required minlength="8"
                        class="mt-1 block w-full px-4 py-3 bg-gray-100 border-gray-200 rounded-lg focus:ring-[#4A0E17] focus:border-[#4A0E17]"
                        placeholder="Re-enter your password">
                </div>

                <p id="form-message" class="text-center text-sm text-red-500"></p>

                <button type="submit"
                    class="w-full bg-[#4A0E17] hover:bg-[#2E080E] text-white font-bold py-3 px-4 rounded-lg transition-all">
                    Update Password
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-500 mt-6">&copy; 2025 ZenithTales. All rights reserved.</p>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';

        // Get reset token from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        const resetForm = document.getElementById('reset-form');
        const successState = document.getElementById('success-state');
        const invalidState = document.getElementById('invalid-state');
        const formMessage = document.getElementById('form-message');

        // If no token in URL, show invalid state
        if (!resetToken) {
            resetForm.classList.add('hidden');
            invalidState.classList.remove('hidden');
        }

        // Password visibility toggle
        const toggleBtn = document.getElementById('toggle-password');
        const passwordField = document.getElementById('new-password');
        toggleBtn?.addEventListener('click', () => {
            passwordField.type = passwordField.type === 'password' ? 'text' : 'password';
        });

        // Form submission
        resetForm?.addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword.length < 8) {
                formMessage.textContent = 'Password must be at least 8 characters.';
                return;
            }

            if (newPassword !== confirmPassword) {
                formMessage.textContent = 'Passwords do not match.';
                return;
            }

            formMessage.textContent = '';
            const submitBtn = resetForm.querySelector('button[type="submit"]');
            if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Updating...'; }

            try {
                const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password: newPassword })
                });

                if (res.ok) {
                    resetForm.classList.add('hidden');
                    successState.classList.remove('hidden');
                } else {
                    const data = await res.json();
                    if (data.error === 'Invalid or expired token') {
                        resetForm.classList.add('hidden');
                        invalidState.classList.remove('hidden');
                    } else {
                        formMessage.textContent = data.error || 'Something went wrong.';
                    }
                }
            } catch (err) {
                formMessage.textContent = 'Could not connect to server. Please try again.';
                console.error('Reset error:', err);
            } finally {
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Update Password'; }
            }
        });
    </script>
</body>
</html>
