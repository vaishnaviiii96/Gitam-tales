<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ZenithTales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gt-header { background: #2E080E; }
        .gt-profile-card { background: #fff; border: 1px solid #d5e0dd; border-radius: 1rem; }
        .tale-card-profile { background: #fff; border: 1px solid #d5e0dd; border-radius: 1rem; overflow: hidden; transition: box-shadow 0.2s; margin-bottom: 1.25rem; }
        .tale-card-profile:hover { box-shadow: 0 4px 16px rgba(0,115,103,0.08); }
        .gt-category-pill { background: #f0faf8; color: #4A0E17; border: 1px solid #c7e8e3; padding: 0.2rem 0.65rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
        .tale-card-footer { background: #f9fafb; border-top: 1px solid #e5ebe9; padding: 0.75rem 1.25rem; display: flex; gap: 1rem; align-items: center; }
    </style>
</head>
<body class="bg-[#f4f6f5]">

    <header class="gt-header px-6 py-4 sticky top-0 z-50 shadow-md">
        <nav class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="zenith-logo.png" alt="Zenith" class="w-8 h-8 rounded-full object-cover" style="mix-blend-mode: lighten;">
                <div class="w-px h-5 bg-white/30 mx-0.5"></div>
                <a href="discover.html" class="text-xl font-bold text-white tracking-tight">ZenithTales</a>
            </div>
            <div id="auth-status" class="flex items-center gap-4">
                <div class="hidden md:flex gap-6">
                    <a href="discover.html" class="text-sm text-white/80 hover:text-white transition-colors">Discover</a>
                    <a href="dashboard.html" class="text-sm text-white/80 hover:text-white transition-colors">My Journey</a>
                </div>
                <!-- Notifications -->
                <a id="notif-bell" href="notifications.html" class="hidden relative items-center justify-center w-9 h-9 bg-white/10 hover:bg-white/20 rounded-full transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full text-white text-[9px] font-bold flex items-center justify-center">0</span>
                </a>
                <a href="login.html" class="border border-white/40 text-white text-sm px-4 py-1.5 rounded-md font-medium hover:bg-white/10 transition-colors">Log in</a>
                <a href="signup.html" class="bg-white text-[#4A0E17] text-sm px-4 py-1.5 rounded-md font-bold hover:bg-white/90 transition-colors shadow-sm">Sign up</a>
            </div>
        </nav>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-3xl">

        <!-- Profile Card skeleton -->
        <div id="profile-card" class="gt-profile-card p-8 mb-8 animate-pulse">
            <div class="flex flex-col sm:flex-row items-center sm:items-start gap-6">
                <div class="w-24 h-24 rounded-full bg-gray-200 flex-shrink-0"></div>
                <div class="flex-grow w-full space-y-3">
                    <div class="h-7 w-48 bg-gray-200 rounded"></div>
                    <div class="h-4 w-32 bg-gray-200 rounded"></div>
                    <div class="h-4 w-full bg-gray-200 rounded"></div>
                    <div class="h-4 w-3/4 bg-gray-200 rounded"></div>
                </div>
            </div>
        </div>

        <!-- Feed skeleton -->
        <div id="profile-feed">
            <div class="tale-card-profile p-6 animate-pulse">
                <div class="flex items-center mb-4 gap-3">
                    <div class="w-10 h-10 rounded-full bg-gray-200 flex-shrink-0"></div>
                    <div class="space-y-2 flex-1">
                        <div class="h-4 w-32 bg-gray-200 rounded"></div>
                        <div class="h-3 w-48 bg-gray-200 rounded"></div>
                    </div>
                </div>
                <div class="h-5 w-3/4 bg-gray-200 rounded mb-3"></div>
                <div class="space-y-2">
                    <div class="h-4 w-full bg-gray-200 rounded"></div>
                    <div class="h-4 w-5/6 bg-gray-200 rounded"></div>
                </div>
            </div>
        </div>

        <!-- Not Found -->
        <div id="not-found" class="hidden text-center py-20">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
            </div>
            <p class="text-lg font-semibold text-gray-700">Profile not found</p>
            <a href="discover.html" class="text-[#4A0E17] hover:underline text-sm mt-2 inline-block">← Back to Discover</a>
        </div>

    </main>

    <script src="js/profile.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
